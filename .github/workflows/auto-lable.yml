name: Auto Label PR & Issues

on:
  pull_request:
    types: [opened, synchronize] # include synchronize to catch file changes
  issues:
    types: [opened]

jobs:
  label-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Label PR
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request.number;

            // Get all changed files in this PR
            const files = await github.rest.pulls.listFiles({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number
            });

            if (files.data.length === 0) {
              console.log("No files changed, skipping labeling");
              return;
            }

            const labels = [];

            // Label based on PR title
            const title = context.payload.pull_request.title.toLowerCase();
            if (title.includes("bug")) labels.push("bug");
            if (title.includes("feature")) labels.push("enhancement");
            if (title.includes("docs")) labels.push("documentation");

            // Label based on changed files
            if (files.data.some(f => f.filename === "public/contributors.json")) {
              labels.push("contributors");
              labels.push("good-first-contribution");
            }

            // Label frontend changes
            if (files.data.some(f => f.filename.startsWith("src/"))) {
              labels.push("frontend");
            }

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr_number,
                labels
              });
            }

  label-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest

    permissions:
      issues: write

    steps:
      - name: Label Issues
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labels = [];

            if (title.includes("bug")) labels.push("bug");
            if (title.includes("feature")) labels.push("enhancement");
            if (title.includes("docs")) labels.push("documentation");

            if (labels.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                labels
              });
            }
