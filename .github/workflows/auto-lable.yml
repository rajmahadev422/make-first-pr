name: Auto Label

on:
  issues:
    types: [opened, edited]
  pull_request:
    types: [opened, edited]

jobs:
  label:
    runs-on: ubuntu-latest

    steps:
      - name: Auto Label PR or Issue
        uses: actions/github-script@v7
        with:
          script: |
            const title = (context.payload.issue?.title || context.payload.pull_request?.title || "").toLowerCase();
            const body = (context.payload.issue?.body || context.payload.pull_request?.body || "").toLowerCase();

            const labels = [];

            if (title.includes("bug") || body.includes("bug")) {
              labels.push("bug");
            }

            if (title.includes("feature") || body.includes("feature")) {
              labels.push("enhancement");
            }

            if (title.includes("doc") || body.includes("documentation")) {
              labels.push("documentation");
            }

            if (title.includes("first pr")) {
              labels.push("good first issue");
            }

            if (labels.length > 0) {
              const issue_number = context.issue.number;

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue_number,
                labels: labels
              });
            }